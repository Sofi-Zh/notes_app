{% extends "base.html" %}
{% block title %} My notes {% endblock %}

{% block content %}

<div id="info">
    <h1> My notes </h1>
</div>

<div>
    <table id="table">
        <tr>
            <th> Creation time </th>
            <th> Note title </th>
        </tr>
        {% for note in notes %}
        <tr>
            <td> {{ note.time }} </td>
            <td><a href="{{ url_for('note_details', id = note.id)}}"> {{ note.title }} </a></td>
        </tr>
        {% else %}
        <tr>
            <td colspan="2">There are no notes yet. <a href="{{ url_for('new_note') }}"> Add a first note </a></td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
